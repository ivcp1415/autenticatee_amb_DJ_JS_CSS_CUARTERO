{% extends 'index.html' %}

{% block content %}
<div class="card">
    <h2> Student List </h2>
    <ul class="list-container">
        {% for student in students %}
        <li class="list-item">
            <div class="list-item-info">
                <b>ID:</b> {{ student.id }} | <b>Nom:</b> {{ student.nom }}
            </div>
            <a href="{% url 'teacher_dashboard' student.id %}" class="btn btn-outline">Més info</a>
        </li>
        {% endfor %}
    </ul>
</div>

{% endblock %}
