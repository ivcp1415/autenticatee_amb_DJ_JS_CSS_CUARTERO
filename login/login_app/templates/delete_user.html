{% extends 'index.html' %}

{% block content %}
<div class="card" style="text-align: center; border-top: 5px solid #e74c3c;">
    <h1>CONFIRMACIÓ ELIMINACIÓ</h1>
    <p>Segur que vols eliminar a <b>{{user.nom}}</b>?</p>
    <form action="" method="POST">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">CONFIRMAR ELIMINACIÓ</button>
        <a href="{% url 'get_all_users' %}" class="btn btn-outline">Cancel·lar</a>
    </form>
</div>
{% endblock %}
